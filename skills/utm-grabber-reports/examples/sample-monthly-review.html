<!DOCTYPE html>
<!--
  UTM Grabber Attribution Reports — Unified Template v1.1.0

  This template renders ANY report in the catalog. It reads a `sections` array
  from the embedded summary JSON and generates the right HTML for each section type.

  Supported section types:
    title-block, stat-strip, hero-number, section-header,
    chart, chart-insight, ranked-list, recommendations,
    insight-card, closing
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Attribution Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --b-primary: #0160BF;
  --b-accent:  #2E90FA;
  --b-ink:     #0B1B34;
  --b-muted:   #64748B;
  --b-surface: #F3F1FA;

  --font-display: "Instrument Serif", "Source Serif Pro", Georgia, serif;
  --font-body:    "Geist", "Inter", system-ui, -apple-system, sans-serif;
  --font-mono:    "Geist Mono", "JetBrains Mono", ui-monospace, monospace;

  --max-width: 1180px;
  --radius-card: 14px;
  --border-subtle: 1px solid rgba(11,27,52,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #FDFCFE; color: var(--b-ink); font-family: var(--font-body); font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

.report { max-width: var(--max-width); margin: 0 auto; padding: 48px 40px 80px; }

/* Header */
.report-header {
  display: flex; align-items: center; gap: 20px;
  padding-bottom: 32px; border-bottom: var(--border-subtle); margin-bottom: 48px;
}
.brand-logo { display: inline-flex; align-items: center; font-family: var(--font-display); font-size: 28px; color: var(--b-ink); line-height: 1; }
.brand-logo img { max-height: 36px; max-width: 180px; display: block; }
.brand-divider { width: 1px; height: 24px; background: rgba(11,27,52,0.15); }
.brand-tag { font-family: var(--font-mono); font-size: 13px; color: var(--b-muted); letter-spacing: 0.02em; }

/* Title block */
.title-block { margin-bottom: 56px; }
.title-block .kicker {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--b-primary); margin-bottom: 18px;
}
.title-block h1 {
  font-family: var(--font-display); font-size: 56px; line-height: 1.05;
  font-weight: 400; color: var(--b-ink); letter-spacing: -0.01em;
  margin-bottom: 16px; max-width: 900px;
}
.title-block h1 em { color: var(--b-primary); font-style: italic; font-weight: 400; }
.meta-line {
  font-family: var(--font-body); font-size: 16px; color: var(--b-muted);
  display: flex; gap: 16px; flex-wrap: wrap;
}
.meta-line > span { display: inline-flex; align-items: center; }
.meta-line > span + span::before {
  content: "·"; margin-right: 16px; color: rgba(11,27,52,0.3);
}

/* Stat strip — two-tone split card */
.stat-strip {
  display: grid; gap: 16px;
  margin: 16px 0 72px;
}
.stat-strip.cols-2 { grid-template-columns: repeat(2, 1fr); }
.stat-strip.cols-3 { grid-template-columns: repeat(3, 1fr); }
.stat-strip.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 900px) {
  .stat-strip.cols-3, .stat-strip.cols-4 { grid-template-columns: repeat(2, 1fr); }
}
.stat-card {
  background: #FFFFFF;
  border: 1px solid rgba(11,27,52,0.10);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.stat-card .stat-value {
  /* Top zone — tinted with brand surface. Number rests on the bottom of this zone. */
  background: var(--b-surface);
  padding: 30px 26px 20px;
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 78px;
  line-height: 0.94;
  color: var(--b-ink);
  letter-spacing: -0.015em;
  margin: 0;
  min-height: 140px;
  display: flex;
  align-items: flex-end;
}
.stat-card .stat-label {
  /* Bottom zone — white. Holds label + delta. */
  background: #FFFFFF;
  padding: 14px 26px 14px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--b-primary);
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid rgba(11,27,52,0.10);
}
.stat-delta {
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
  padding: 0;
  background: none;
  border-radius: 0;
  text-transform: none;
  margin-left: auto;
}
.stat-delta.up   { color: #1d7a4a; }
.stat-delta.up::before   { content: "▲ "; }
.stat-delta.down { color: #c4353a; }
.stat-delta.down::before { content: "▼ "; }
.stat-delta.flat { color: var(--b-muted); }
.stat-delta.flat::before { content: "—"; }

/* Hero number — two-tone, matches card family */
.hero-number {
  background: #FFFFFF;
  border: 1px solid rgba(11,27,52,0.10);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 56px;
  display: flex; flex-direction: column;
}
.hero-number .hero-top {
  background: var(--b-surface);
  padding: 56px 24px 48px;
  text-align: center;
  border-bottom: 1px solid rgba(11,27,52,0.10);
}
.hero-number .hero-kicker {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--b-primary); margin-bottom: 20px;
}
.hero-number .hero-value {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 144px; line-height: 0.92;
  font-weight: 400; color: var(--b-ink);
  letter-spacing: -0.015em;
}
.hero-number .hero-bottom {
  background: #FFFFFF;
  padding: 24px 32px 26px;
  text-align: center;
}
.hero-number .hero-label {
  font-family: var(--font-body); font-size: 17px; color: var(--b-ink);
  max-width: 620px; margin: 0 auto; line-height: 1.5;
}

/* Section header */
.section-header {
  margin-top: 56px; margin-bottom: 24px;
  display: flex; align-items: baseline; gap: 14px;
  border-bottom: var(--border-subtle); padding-bottom: 14px;
}
.section-header .section-number { font-family: var(--font-mono); font-size: 12px; color: var(--b-muted); letter-spacing: 0.08em; }
.section-header .section-kicker {
  font-family: var(--font-mono); font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--b-primary); font-weight: 500;
}
.section-header h2 {
  font-family: var(--font-display); font-size: 32px; font-weight: 400;
  color: var(--b-ink); line-height: 1.2;
  margin-left: auto; text-align: right; max-width: 60%;
}
.section-header h2 em { color: var(--b-primary); font-style: italic; }

/* Chart blocks */
.chart-block { margin-bottom: 56px; }
.chart-block.with-insight {
  display: grid; grid-template-columns: 1.6fr 1fr; gap: 32px; align-items: stretch;
}
@media (max-width: 900px) { .chart-block.with-insight { grid-template-columns: 1fr; } }
.chart-wrap {
  background: #FFFFFF;
  border-radius: 4px;
  padding: 24px;
  border: 1px solid rgba(11,27,52,0.10);
  min-height: 340px; position: relative;
}
.chart-wrap canvas { width: 100% !important; height: 100% !important; max-height: 400px; }
.chart-caption { font-family: var(--font-mono); font-size: 13px; color: var(--b-muted); margin-top: 14px; text-align: center; }
.insight-card {
  /* Chart-side insight — restrained, no tint. Matches the clean tone of stat cards. */
  background: #FFFFFF;
  border: 1px solid rgba(11,27,52,0.10);
  border-radius: 4px;
  padding: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.insight-card .insight-top {
  background: var(--b-surface);
  padding: 22px 24px 20px;
  border-bottom: 1px solid rgba(11,27,52,0.10);
}
.insight-card .insight-kicker {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--b-primary); margin-bottom: 12px;
}
.insight-card h3 {
  font-family: var(--font-display); font-size: 22px; line-height: 1.28;
  font-weight: 400; color: var(--b-ink); margin: 0;
}
.insight-card h3 em { color: var(--b-primary); font-style: italic; }
.insight-card .insight-body {
  padding: 20px 24px 22px;
  flex: 1;
}
.insight-card .insight-body p { font-size: 14.5px; color: var(--b-ink); line-height: 1.55; margin-bottom: 10px; }
.insight-card .insight-body p:last-child { margin-bottom: 0; }

/* Ranked list */
.ranked-list {
  margin-bottom: 56px;
  border: 1px solid rgba(11,27,52,0.10);
  border-radius: 4px;
  overflow: hidden;
  background: #FFFFFF;
}
.ranked-list table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.ranked-list thead tr { background: var(--b-surface); }
.ranked-list th {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--b-muted); text-align: left;
  padding: 16px 20px; border-bottom: var(--border-subtle);
}
.ranked-list td {
  padding: 18px 20px; border-bottom: 1px solid rgba(11,27,52,0.04);
  font-size: 15px; color: var(--b-ink); vertical-align: middle;
  overflow: hidden; text-overflow: ellipsis;
}
.ranked-list tr:last-child td { border-bottom: none; }
.ranked-list td.col-rank { font-family: var(--font-display); font-size: 22px; color: var(--b-muted); }
.ranked-list td.col-name { font-weight: 500; }
.ranked-list td.col-source { font-family: var(--font-mono); font-size: 13px; color: var(--b-muted); }
.ranked-list td.col-number { font-family: var(--font-display); font-size: 20px; color: var(--b-ink); }
.ranked-list td.col-mono-number { font-family: var(--font-mono); font-size: 14px; color: var(--b-ink); }
.ranked-list td.col-trend { font-family: var(--font-body); font-size: 14px; }
.ranked-list th.align-right, .ranked-list td.align-right { text-align: right; }
.ranked-list th.align-center, .ranked-list td.align-center { text-align: center; }

.trend-pill { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; white-space: nowrap; }
.trend-pill::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.trend-pill.steady  { color: var(--b-primary); }
.trend-pill.rising  { color: #1d7a4a; }
.trend-pill.cooling { color: #c97a1c; }
.trend-pill.cold    { color: #c4353a; }

/* Recommendations — two-tone, matches stat-card + insight-card */
.recommendations-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 56px;
}
@media (max-width: 900px) { .recommendations-grid { grid-template-columns: 1fr; } }
.rec-card {
  background: #FFFFFF;
  border: 1px solid rgba(11,27,52,0.10);
  border-radius: 4px;
  overflow: hidden;
  display: flex; flex-direction: column;
  padding: 0;
}
.rec-card .rec-top {
  background: var(--b-surface);
  padding: 22px 26px 22px;
  border-bottom: 1px solid rgba(11,27,52,0.10);
  display: flex; flex-direction: column; gap: 12px;
}
.rec-card .rec-number {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.18em; color: var(--b-primary);
}
.rec-card h3 {
  font-family: var(--font-display); font-size: 24px; line-height: 1.25;
  font-weight: 400; color: var(--b-ink); margin: 0;
}
.rec-card h3 em { color: var(--b-primary); font-style: italic; }
.rec-card .rec-body {
  background: #FFFFFF;
  padding: 22px 26px 24px;
  flex: 1;
}
.rec-card .rec-body p { font-size: 15px; line-height: 1.6; color: var(--b-ink); margin: 0; }

/* Standalone insight — two-tone split, matches stat-card design */
.standalone-insight {
  background: #FFFFFF;
  border: 1px solid rgba(11,27,52,0.10);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 56px;
}
.standalone-insight .insight-top {
  background: var(--b-surface);
  padding: 30px 36px 28px;
  border-bottom: 1px solid rgba(11,27,52,0.10);
}
.standalone-insight .insight-kicker {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--b-primary); margin-bottom: 14px;
}
.standalone-insight h3 {
  font-family: var(--font-display);
  font-size: 30px; line-height: 1.2;
  font-weight: 400; color: var(--b-ink);
  margin: 0;
}
.standalone-insight h3 em { color: var(--b-primary); font-style: italic; }
.standalone-insight .insight-body {
  background: #FFFFFF;
  padding: 26px 36px 28px;
}
.standalone-insight .insight-body p {
  font-size: 16px; line-height: 1.6; color: var(--b-ink); margin-bottom: 12px;
}
.standalone-insight .insight-body p:last-child { margin-bottom: 0; }

/* Closing */
.closing { margin-top: 80px; padding-top: 40px; border-top: var(--border-subtle); text-align: center; }
.closing h2 { font-family: var(--font-display); font-size: 36px; font-weight: 400; color: var(--b-ink); margin-bottom: 14px; }
.closing h2 em { color: var(--b-primary); font-style: italic; }
.closing-body { font-size: 15px; color: var(--b-muted); max-width: 520px; margin: 0 auto; }

/* Footer */
.report-footer {
  margin-top: 56px; padding-top: 20px; border-top: var(--border-subtle);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  font-family: var(--font-mono); font-size: 13px; color: var(--b-muted);
}

/* ========================================================
   Print CSS — "Save as PDF" from browser should look great
   ======================================================== */
@page {
  size: letter;
  margin: 14mm 12mm 14mm 12mm;
}

@media print {
  html, body {
    background: #FFFFFF;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }
  body { font-size: 12pt; }
  .report { padding: 0; max-width: 100%; }

  /* Slightly compress vertical rhythm to fit more per page */
  .title-block { margin-bottom: 32px; page-break-after: avoid; }
  .title-block h1 { font-size: 44pt; line-height: 1.05; }
  .title-block .kicker { font-size: 9pt; }
  .title-block .meta-line { font-size: 11pt; }

  .stat-strip { gap: 10px; margin: 10px 0 32px; page-break-inside: avoid; }
  .stat-card .stat-value { font-size: 52pt; }
  .stat-card .stat-label { font-size: 8.5pt; }

  .hero-number { margin-bottom: 28px; page-break-inside: avoid; }
  .hero-number .hero-top { padding: 36px 18px 28px; }
  .hero-number .hero-value { font-size: 96pt; }
  .hero-number .hero-label { font-size: 13pt; }

  .section-header { margin-top: 28px; margin-bottom: 14px; page-break-after: avoid; }
  .section-header h2 { font-size: 22pt; }

  .chart-block { margin-bottom: 28px; page-break-inside: avoid; }
  .chart-wrap { min-height: 0; padding: 16px; }
  .chart-wrap canvas { max-height: 300px; }
  .chart-caption { font-size: 9pt; margin-top: 8px; }

  .chart-block.with-insight { grid-template-columns: 1.5fr 1fr; gap: 18px; }
  .insight-card .insight-top { padding: 16px 18px 14px; }
  .insight-card .insight-body { padding: 14px 18px 14px; }
  .insight-card h3 { font-size: 14pt; }
  .insight-card p { font-size: 10pt; }

  .ranked-list { margin-bottom: 24px; page-break-inside: auto; }
  .ranked-list table { page-break-inside: auto; }
  .ranked-list thead { display: table-header-group; } /* repeat header on each page */
  .ranked-list tr { page-break-inside: avoid; page-break-after: auto; }
  .ranked-list th { font-size: 8.5pt; padding: 10px 14px; }
  .ranked-list td { font-size: 10pt; padding: 11px 14px; }
  .ranked-list td.col-rank { font-size: 14pt; }
  .ranked-list td.col-number { font-size: 14pt; }

  .standalone-insight { margin-bottom: 28px; page-break-inside: avoid; }
  .standalone-insight .insight-top { padding: 20px 24px 18px; }
  .standalone-insight .insight-body { padding: 18px 24px 20px; }
  .standalone-insight h3 { font-size: 18pt; }
  .standalone-insight p { font-size: 11pt; }

  .recommendations-grid { gap: 12px; margin-bottom: 28px; page-break-inside: avoid; }
  .rec-card { page-break-inside: avoid; }
  .rec-card .rec-top { padding: 14px 18px 14px; }
  .rec-card .rec-body { padding: 14px 18px 16px; }
  .rec-card h3 { font-size: 14pt; }
  .rec-card p { font-size: 10pt; }

  .closing { margin-top: 40px; padding-top: 24px; page-break-before: auto; }
  .closing h2 { font-size: 24pt; }

  .report-footer { margin-top: 30px; font-size: 8.5pt; padding-top: 14px; }

  /* Hide anything decorative we don't want in print */
  .no-print { display: none !important; }
}




/* ============================================================
   MOBILE / RESPONSIVE (v1.1.0)
   ============================================================ */
@media (max-width: 720px) {
  .report { padding: 28px 18px 56px; }
  .title-block h1 { font-size: 40px; line-height: 1.1; }
  .title-block .meta-line { font-size: 14px; }
  .section-header h2 { font-size: 32px; }

  /* Stat strip stacks to 2-col on mobile */
  .stat-strip.cols-4 { grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-strip.cols-3 { grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card .stat-value { padding: 22px 18px 14px; font-size: 52px; }
  .stat-card .stat-label { padding: 10px 18px; }

  /* Recommendations become single-column */
  .recommendations-grid { grid-template-columns: 1fr !important; }

  /* Chart-insight stacks */
  .chart-block.with-insight { grid-template-columns: 1fr !important; gap: 16px; }

  /* Hero number scales down */
  .hero-number .hero-value { font-size: 88px; }
  .hero-number .hero-top { padding: 34px 18px 24px; }

  /* Ranked list allows horizontal scroll rather than squishing */
  .ranked-list-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .ranked-list { min-width: 520px; }

  /* Closing panel tighter padding */
  .closing-panel { padding: 28px 20px 32px; }
  .closing-panel h2 { font-size: 30px; }
}

@media (max-width: 420px) {
  .stat-strip { grid-template-columns: 1fr !important; }
}

/* ============================================================
   A11Y — Focus + contrast fallbacks
   ============================================================ */
*:focus-visible {
  outline: 2px solid var(--b-primary);
  outline-offset: 2px;
}

/* Prefer user color-scheme when they opt out via OS */
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* Ensure minimum tap target size (44x44) on interactive elements,
   even though reports are read-only — safe default */
a, button { min-height: 44px; min-width: 44px; }


</style>

<style id="brand-overrides"></style>
</head>

<div class="report" id="report-root">
  <div class="report-header">
    <div class="brand-logo" id="brand-logo-slot"></div>
    <div class="brand-divider"></div>
    <div class="brand-tag" id="brand-tag-slot"></div>
  </div>
  <div id="sections-root"></div>
  <div class="report-footer">
    <span id="footer-source"></span>
    <span id="footer-version"></span>
  </div>
</div>

<script>
(function () {
  const dataEl = document.getElementById('report-data');
  if (!dataEl) return;
  let data;
  try { data = JSON.parse(dataEl.textContent); }
  catch (e) { console.error('Report data invalid JSON:', e); return; }

  const brand = data.meta.brand_profile || {};
  const colors = brand.colors || {};
  // HTML is light-only — gradient theme is PPTX-only per v1.1.0
  const overrideTag = document.getElementById('brand-overrides');
  if (overrideTag) {
    overrideTag.textContent = `:root {
      ${colors.primary ? `--b-primary: ${colors.primary};` : ''}
      ${colors.accent  ? `--b-accent:  ${colors.accent};`  : ''}
      ${colors.ink     ? `--b-ink:     ${colors.ink};`     : ''}
      ${colors.muted   ? `--b-muted:   ${colors.muted};`   : ''}
      ${colors.surface ? `--b-surface: ${colors.surface};` : ''}
    }`;
  }

  const logoSlot = document.getElementById('brand-logo-slot');
  if (brand.logo) {
    if (brand.logo.type === 'url') logoSlot.innerHTML = `<img src="${brand.logo.value}" alt="${brand.company_name || ''}">`;
    else if (brand.logo.type === 'upload') logoSlot.innerHTML = `<img src="data:image/png;base64,${brand.logo.value}" alt="${brand.company_name || ''}">`;
    else logoSlot.innerHTML = brand.logo.value;
  } else {
    logoSlot.textContent = brand.company_name || data.meta.customer_name || '';
  }

  // Remove "× UTM Grabber" tag — just show the brand name in the header
  const tagSlot = document.getElementById('brand-tag-slot');
  if (tagSlot) tagSlot.textContent = '';

  const footerSource = document.getElementById('footer-source');
  footerSource.textContent = `Data source: UTM Grabber · ${data.meta.customer_domain || ''}`;
  const footerVersion = document.getElementById('footer-version');
  const ver = data.meta.skill_version || '1.1.0';
  const genDate = data.meta.generated_at ? new Date(data.meta.generated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
  footerVersion.textContent = `Prepared by UTM Grabber · v${ver} · ${genDate}`;

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function renderTitle(s) {
    if (!s) return '';
    const parts = String(s).split(/(\*[^*]+\*)/g);
    return parts.map(p =>
      p.startsWith('*') && p.endsWith('*') ? `<em>${esc(p.slice(1, -1))}</em>` : esc(p)
    ).join('');
  }

  const renderers = {
    'title-block': (s) => {
      const metaBits = (s.meta_bits || []).map(m => `<span>${esc(m)}</span>`).join('');
      return `<div class="title-block">
        ${s.kicker ? `<div class="kicker">${esc(s.kicker)}</div>` : ''}
        <h1>${renderTitle(s.title)}</h1>
        ${metaBits ? `<div class="meta-line">${metaBits}</div>` : ''}
      </div>`;
    },
    'stat-strip': (s) => {
      const cards = (s.stats || []).map(stat => {
        const dc = stat.delta_direction || 'flat';
        const dh = stat.delta_label ? `<span class="stat-delta ${dc}">${dc === 'flat' ? '' : esc(stat.delta_label)}</span>` : '';
        return `<div class="stat-card">
          <div class="stat-value">${esc(stat.value)}</div>
          <div class="stat-label"><span>${esc(stat.label)}</span>${dh}</div>
        </div>`;
      }).join('');
      const cols = s.stats ? s.stats.length : 4;
      return `<div class="stat-strip cols-${cols}">${cards}</div>`;
    },
    'hero-number': (s) => `<div class="hero-number">
      <div class="hero-top">
        ${s.kicker ? `<div class="hero-kicker">${esc(s.kicker)}</div>` : ''}
        <div class="hero-value">${esc(s.value)}</div>
      </div>
      ${s.label ? `<div class="hero-bottom"><div class="hero-label">${esc(s.label)}</div></div>` : ''}
    </div>`,
    'section-header': (s) => `<div class="section-header">
      ${s.number ? `<span class="section-number">${esc(s.number)}</span>` : ''}
      ${s.kicker ? `<span class="section-kicker">${esc(s.kicker)}</span>` : ''}
      <h2>${renderTitle(s.title)}</h2>
    </div>`,
    'chart': (s, idx) => `<div class="chart-block">
      <div class="chart-wrap"><canvas id="chart-${idx}"></canvas></div>
      ${s.caption ? `<div class="chart-caption">${esc(s.caption)}</div>` : ''}
    </div>`,
    'chart-insight': (s, idx) => `<div class="chart-block with-insight">
      <div>
        <div class="chart-wrap"><canvas id="chart-${idx}"></canvas></div>
        ${s.caption ? `<div class="chart-caption">${esc(s.caption)}</div>` : ''}
      </div>
      <div class="insight-card">
        <div class="insight-top">
          ${s.insight_kicker ? `<div class="insight-kicker">${esc(s.insight_kicker)}</div>` : ''}
          ${s.insight_title ? `<h3>${renderTitle(s.insight_title)}</h3>` : ''}
        </div>
        ${(s.insight_body && s.insight_body.length) ? `<div class="insight-body">${(s.insight_body || []).map(p => `<p>${esc(p)}</p>`).join('')}</div>` : ''}
      </div>
    </div>`,
    'ranked-list': (s) => {
      const cols = s.columns || [];
      const thead = `<thead><tr>${cols.map(c =>
        `<th class="${c.align === 'right' ? 'align-right' : c.align === 'center' ? 'align-center' : ''}" style="${c.width ? `width:${c.width};` : ''}">${esc(c.label)}</th>`
      ).join('')}</tr></thead>`;
      const tbody = `<tbody>${(s.rows || []).map(row =>
        `<tr>${cols.map(c => {
          const v = row[c.key];
          const alignCls = c.align === 'right' ? ' align-right' : c.align === 'center' ? ' align-center' : '';
          const cls = `col-${c.type || 'name'}${alignCls}`;
          if (c.type === 'trend' && v) {
            return `<td class="${cls}"><span class="trend-pill ${v.state || 'steady'}">${esc(v.label || v)}</span></td>`;
          }
          return `<td class="${cls}">${v != null ? esc(v) : ''}</td>`;
        }).join('')}</tr>`
      ).join('')}</tbody>`;
      return `<div class="ranked-list"><table>${thead}${tbody}</table></div>`;
    },
    'recommendations': (s) => {
      const cards = (s.items || []).map((r, i) => `<div class="rec-card">
        <div class="rec-top">
          <div class="rec-number">${esc(r.label || `Action ${String(i+1).padStart(2,'0')}`)}</div>
          <h3>${renderTitle(r.title)}</h3>
        </div>
        <div class="rec-body"><p>${esc(r.body)}</p></div>
      </div>`).join('');
      return `<div class="recommendations-grid">${cards}</div>`;
    },
    'insight-card': (s) => `<div class="standalone-insight">
      <div class="insight-top">
        ${s.kicker ? `<div class="insight-kicker">${esc(s.kicker)}</div>` : ''}
        ${s.title ? `<h3>${renderTitle(s.title)}</h3>` : ''}
      </div>
      ${(s.body && s.body.length) ? `<div class="insight-body">${(s.body || []).map(p => `<p>${esc(p)}</p>`).join('')}</div>` : ''}
    </div>`,
    'closing': (s) => `<div class="closing">
      <h2>${renderTitle(s.title || 'Thank *you* for reading.')}</h2>
      ${s.body ? `<p class="closing-body">${esc(s.body)}</p>` : ''}
    </div>`,
  };

  const root = document.getElementById('sections-root');
  const chartSections = [];

  (data.sections || []).forEach((s, idx) => {
    const r = renderers[s.type];
    if (!r) { console.warn('Unknown section type:', s.type); return; }
    try {
      root.insertAdjacentHTML('beforeend', r(s, idx));
      if (s.type === 'chart' || s.type === 'chart-insight') chartSections.push({ s, idx });
    } catch (err) { console.warn(`Skipped section ${idx} (${s.type}):`, err.message); }
  });

  Chart.defaults.font.family = '"Geist", "Inter", system-ui, sans-serif';
  Chart.defaults.font.size = 13;
  Chart.defaults.color = getComputedStyle(document.documentElement).getPropertyValue('--b-ink').trim() || '#0B1B34';

  function getPalette() {
    const cs = getComputedStyle(document.documentElement);
    return [
      cs.getPropertyValue('--b-primary').trim(),
      cs.getPropertyValue('--b-accent').trim(),
      '#FFC857', '#30B47A', '#6FB1E8', '#F59E0B',
      cs.getPropertyValue('--b-ink').trim(),
    ];
  }

  chartSections.forEach(({ s, idx }) => {
    const canvas = document.getElementById(`chart-${idx}`);
    if (!canvas) return;
    const palette = getPalette();
    const c = s.chart || {};
    try {
      if (c.type === 'doughnut') {
        new Chart(canvas, {
          type: 'doughnut',
          data: { labels: c.labels, datasets: [{ data: c.values, backgroundColor: palette, borderWidth: 3, borderColor: '#FFFFFF' }] },
          options: {
            responsive: true, maintainAspectRatio: false, cutout: '62%',
            plugins: {
              legend: { position: 'right', labels: { font: { size: 13 }, boxWidth: 12, padding: 14 } },
              tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed}${c.unit || ''}` } },
            },
          },
        });
      } else if (c.type === 'bar-horizontal') {
        new Chart(canvas, {
          type: 'bar',
          data: { labels: c.labels.slice().reverse(), datasets: [{ data: c.values.slice().reverse(), backgroundColor: palette[0], borderRadius: 4 }] },
          options: {
            indexAxis: 'y', responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { color: 'rgba(11,27,52,0.06)' }, beginAtZero: true, title: { display: !!c.x_title, text: c.x_title || '' } },
              y: { grid: { display: false } },
            },
          },
        });
      } else if (c.type === 'bar-vertical') {
        new Chart(canvas, {
          type: 'bar',
          data: { labels: c.labels, datasets: [{ data: c.values, backgroundColor: palette[0], borderRadius: 4 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { grid: { color: 'rgba(11,27,52,0.06)' }, beginAtZero: true } },
          },
        });
      } else if (c.type === 'bar-stacked') {
        new Chart(canvas, {
          type: 'bar',
          data: {
            labels: c.labels,
            datasets: (c.stacks || []).map((s, i) => ({ label: s.label, data: s.values, backgroundColor: palette[i % palette.length], borderRadius: 3 })),
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'top', align: 'end' } },
            scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, grid: { color: 'rgba(11,27,52,0.06)' }, beginAtZero: true } },
          },
        });
      } else if (c.type === 'bar-grouped') {
        new Chart(canvas, {
          type: 'bar',
          data: {
            labels: c.labels,
            datasets: (c.groups || []).map((g, i) => ({ label: g.label, data: g.values, backgroundColor: palette[i % palette.length], borderRadius: 3 })),
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'top', align: 'end' } },
            scales: { x: { grid: { display: false } }, y: { grid: { color: 'rgba(11,27,52,0.06)' }, beginAtZero: true } },
          },
        });
      } else if (c.type === 'line' || c.type === 'area') {
        new Chart(canvas, {
          type: 'line',
          data: {
            labels: c.labels,
            datasets: [{
              data: c.values,
              borderColor: palette[0],
              backgroundColor: c.type === 'area' ? palette[0] + '22' : 'transparent',
              fill: c.type === 'area', tension: 0.3, pointRadius: 2,
              pointBackgroundColor: palette[0], borderWidth: 2,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } }, y: { grid: { color: 'rgba(11,27,52,0.06)' }, beginAtZero: true } },
          },
        });
      } else {
        console.warn('Unknown chart type:', c.type);
      }
    } catch (err) {
      console.warn(`Chart render failed for section ${idx}:`, err.message);
    }
  });
})();
</script>
</body>
</html>
