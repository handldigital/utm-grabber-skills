name: Release skills

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build per-skill .skill zips
        run: |
          set -euo pipefail
          mkdir -p dist
          for d in skills/*/; do
            [ -f "$d/SKILL.md" ] || continue
            name="$(basename "$d")"
            # Archive with the skill folder as the top-level entry so Claude.ai accepts it.
            (cd skills && zip -r -X "../dist/$name.skill" "$name" -x "*.DS_Store")
          done
          echo "Built artifacts:"
          ls -la dist

      - name: Publish release with skill artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
